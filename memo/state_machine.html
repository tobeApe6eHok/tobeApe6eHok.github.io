<script src="https://unpkg.com/gojs/release/go-debug.js"></script>
<script src="https://www.unpkg.com/jquery@3.6.4/dist/jquery.min.js"></script>
<script>
function debug(message) {
    $('#debug').html(message);
}

function debug_obj(obj) {
    $('#debug').html(JSON.stringify(obj));
}

function visualize(divname, MODEL) {
    if (MODEL.states && MODEL.edges) {
        visualizeStateMachine(divname, MODEL);
    } else {
        visualizeLegacy(divname, MODEL);
    }
}

function visualizeStateMachine(divname, MODEL) {
    var $$ = go.GraphObject.make;
    var diagram =
        $$(go.Diagram, divname,
            {
                initialContentAlignment: go.Spot.Center,
                layout: $$(go.LayeredDigraphLayout, { 
                    direction: 90, 
                    columnSpacing: 80, 
                    layerSpacing: 60
                }),
                "undoManager.isEnabled": false
            });

    diagram.nodeTemplate = $$(go.Node, "Auto",
        $$(go.Shape, "RoundedRectangle", { 
            fill: "#F8F8F8", 
            stroke: "#4A4A4A", 
            strokeWidth: 1.5 
        },
        new go.Binding("fill", "group", function(group) {
            if (group === "group_0") return "#FFD700";  // Gold for main state machine
            return "#E8F4F8";  // Light blue for secondary state machine
        }),
        new go.Binding("stroke", "group", function(group) {
            if (group === "group_0") return "#FF8C00";  // Dark orange for main
            return "#4A90E2";  // Blue for secondary
        })),
        $$(go.TextBlock, { font: "14px sans-serif", margin: 8, wrap: go.TextBlock.WrapFit, textAlign: "center" },
            new go.Binding("text", "text"))
    );

    diagram.groupTemplate = $$(go.Group, "Auto",
        $$(go.Shape, "RoundedRectangle", { 
            fill: "#F0F0F0", 
            stroke: "#888888", 
            strokeWidth: 2
        }),
        $$(go.Placeholder, { padding: 15 })
    );

    diagram.linkTemplate = $$(go.Link,
        { routing: go.Link.AvoidsNodes, curve: go.Link.JumpOver, corner: 5 },
        $$(go.Shape, { strokeWidth: 2.5 },
            new go.Binding("stroke", "group", function(group) {
                if (group === "group_0") return "#FF8C00";  // Dark orange for main state machine
                return "#4A90E2";  // Blue for secondary state machine
            })),
        $$(go.Shape, { toArrow: "Standard" },
            new go.Binding("stroke", "group", function(group) {
                if (group === "group_0") return "#FF8C00";  // Dark orange for main
                return "#4A90E2";  // Blue for secondary
            }),
            new go.Binding("fill", "group", function(group) {
                if (group === "group_0") return "#FF8C00";  // Dark orange for main
                return "#4A90E2";  // Blue for secondary
            })),
        $$(go.TextBlock, new go.Binding("text", "label"),
            { font: "12px sans-serif", segmentOffset: new go.Point(0, -10), segmentOrientation: go.Link.OrientUpright })
    );

    var groupNodeData = [];
    var groupMap = {};
    if (MODEL.states && MODEL.states.length > 0 && MODEL.states[0].group) {
        for (var i = 0; i < MODEL.states.length; i++) {
            var state = MODEL.states[i];
            if (state.group && !groupMap[state.group]) {
                groupNodeData.push({ key: state.group, isGroup: true });
                groupMap[state.group] = true;
            }
        }
    }

    if (groupNodeData.length > 0) {
        diagram.model = new go.GraphLinksModel(MODEL.states, MODEL.edges, groupNodeData);
    } else {
        diagram.model = new go.GraphLinksModel(MODEL.states, MODEL.edges);
    }
}

function visualizeLegacy(divname, MODEL) {
    var $$ = go.GraphObject.make;
    var diagram =
        $$(go.Diagram, divname,  // must name or refer to the DIV HTML element
            {
                initialContentAlignment: go.Spot.Center,
                layout: $$(go.ForceDirectedLayout),
                // moving and copying nodes also moves and copies their subtrees
                "commandHandler.copiesTree": true,  // for the copy command
                "commandHandler.deletesTree": true, // for the delete command
                "draggingTool.dragsTree": true,
                "diagram.maxSelectionCount": 1,
                "undoManager.isEnabled": false
            });

    var V = {};
    for (let i in MODEL.vertices) {
        var v = MODEL.vertices[i];
        V[v.hashcode] = v;
        v.created = false;
    }

    var init_state = MODEL.vertices[0];
    init_state.contexts[init_state.current] = -1;

    function clear_hl() {
        for (let i = 1; i <= 100; i++) {
            $(`#${divname}-container`).find("#True-" + i).attr('style', '');
        }
    }

    function hl(line, color) {
        $(`#${divname}-container`).find("#True-" + line).attr('style', 'background-color:' + color);
    }

    function update_selection() {
        clear_hl();
        var sel = diagram.selection.first();
        if (sel !== null) {
            var data = sel.data;
            if (data.key) {
                hl(data.pc, '#61eb76');
            } else {
                var st = V[data.from];
                var ed = V[data.to];
                if (st.contexts[st.current]) {
                    hl(st.contexts[st.current].pc, '#f59898');
                }
                if (ed.contexts[ed.current]) {
                    hl(ed.contexts[ed.current].pc, '#61eb76');
                }
            }
        }
    }

    function expandNode(node) {
        diagram.startTransaction("CollapseExpandTree");
        var data = node.data;
        if (!data.everExpanded) {
            diagram.model.setDataProperty(data, "everExpanded", true);
            var numchildren = createSubTree(data);
            if (numchildren === 0) {
                node.findObject('TREEBUTTON').visible = false;
            }
        }
        if (node.isTreeExpanded) {
            diagram.commandHandler.collapseTree(node);
        } else {
            diagram.commandHandler.expandTree(node);
        }
        diagram.commitTransaction("CollapseExpandTree");
    }

    function parseLink(linkdata) {
        var st = linkdata.from;
        var ed = linkdata.to;
        var label = linkdata.label;

        linkdata.content = "";

        if (V[st].current != V[ed].current) {
            const c1 = V[st].contexts[V[st].current];
            const c2 = V[ed].contexts[V[ed].current];
            if (c2) {
                const pid = V[ed].current + 1001;
                if (!c1) {
                    const p1 = V[st].current + 1001;
                    label = `switch to ${pid} (${c2.name})`;
                    linkdata.content = `${p1} exit`;
                } else {
                    if (c1.heap != c2.heap) {
                        label = `switch to ${pid} (${c2.name})`;
                    } else {
                        label = `switch to ${c2.name}`;
                    }
                }
            }
        } else if (label.match(/^t[0-9]+$/)) {
            label = V[st].contexts[V[st].current].name;
        }
        if (label == "write") {
            linkdata.content = V[ed].stdout.substring(V[st].stdout.length);
        }
        linkdata.label = label;
    }

    function addInitNode(model, nodedata) {
        const key = nodedata.key;
        V[key].created = true;
        nodedata.isGroup = true;
        model.addNodeData(nodedata);
    }

    function var_list(d) {
        const ret = [];
        for (let k in d) {
            ret.push(`${k} = ${d[k]}`);
        }
        ret.sort();
        if (ret.length == 0) {
            ret.push('');
        }
        return ret;
    }

    function addNode(model, nodedata) {
        const key = nodedata.key;
        var v = V[key];
        if (v.created) {
            return;
        }
        v.created = true;
        nodedata.current = v.current;
        nodedata.isGroup = true;

        var pc = null;
        if (v.contexts[v.current] && v.contexts[v.current].pc) {
            pc = (1001 + v.current) + " " + v.contexts[v.current].pc;
            nodedata.pc = v.contexts[v.current].pc;
        }
        if (!pc) {
            var pc = '(pc)'
        }

        ret = [nodedata]

        for (let i in v.contexts) {
            var c = v.contexts[i];
            if (c) {
                if (i == v.current) {
                    category = 'thread_active';
                } else {
                    category = 'thread';
                }
                const pid = 1001 + parseInt(i);
                ret.push(
                    { key: `${key}-context-${i}`, items: var_list(c.locals), group: key, pc: c.pc, pid: `${c.name} (${pid})`, category: category }
                )
            }
        }

        const hs = {};

        for (let h in v.heaps) {
            var heap = v.heaps[h];
            hs[h] = { key: `${key}-heap-${h}`, items: var_list(heap), group: key, category: 'list' };
        }

        for (let i in v.contexts) {
            var c = v.contexts[i];
            if (c) {
                link = {
                    from: `${key}-context-${i}`,
                    to: `${key}-heap-${c.heap}`,
                    category: 'short'
                };
                model.addLinkData(link);

                if (hs[c.heap]) {
                    ret.push(hs[c.heap]);
                    hs[c.heap] = undefined;
                }
            }
        }

        for (let n of ret) {
            model.addNodeData(n);
        }

        if (v.stdout.length > 0) {
            model.addNodeData({ key: 'scratch', text: v.stdout.trim(), group: key });
        }
    }

    function createSubTree(parentdata) {
        var model = diagram.model;
        var parent = diagram.findNodeForData(parentdata);
        var children = [];

        for (let i in MODEL.edges) {
            var st = MODEL.edges[i][0];
            var ed = MODEL.edges[i][1];
            var label = MODEL.edges[i][2];
            if (st == parentdata.key) {
                children.push({ key: st, ed: ed, label: label });
            }
        }

        for (var i = 0; i < children.length; i++) {
            var key = children[i].ed;
            var childdata = {
                key: key,
                parent: parentdata.key
            };
            addNode(model, childdata);

            var linkdata = {
                from: parentdata.key,
                to: children[i].ed,
                label: children[i].label
            };
            parseLink(linkdata);
            model.addLinkData(linkdata);

            // position the new child node close to the parent
            var child = diagram.findNodeForKey(key);
            child.location = parent.location;
        }

        return children.length
    }

    const defaultNode = $$(go.Node, "Auto",
        $$(go.Shape, "Rectangle", { fill: "white" }),
        $$(go.TextBlock,
            {
                font: "12px Monospace",
                stroke: "gray",
                margin: 2
            },
            new go.Binding("text", "text"))
    );

    const itemNode = $$(go.Node, "Auto",
        $$(go.Shape, "Rectangle", { fill: "white" }),
        $$(go.Panel, "Vertical",
            {
                alignment: go.Spot.TopLeft,
                defaultAlignment: go.Spot.Left,
                stretch: go.GraphObject.Horizontal
            },
            new go.Binding("itemArray", "items"))
    );

    const leftAlign = {
        alignment: go.Spot.TopLeft,
        defaultAlignment: go.Spot.Left,
        stretch: go.GraphObject.Horizontal
    };

    const threadNode = $$(go.Node, "Auto",
        $$(go.Panel, "Vertical",
            $$(go.Panel, "Auto",
                leftAlign,
                $$(go.TextBlock,
                    {
                        font: "10px Monospace"
                    },
                    new go.Binding("text", "pid")
                )
            ),
            $$(go.Panel, "Auto",
                leftAlign,
                $$(go.Shape, "Rectangle", { fill: "white" }),
                $$(go.Panel, "Vertical",
                    {
                        alignment: go.Spot.TopLeft,
                        defaultAlignment: go.Spot.Left,
                        stretch: go.GraphObject.Horizontal
                    },
                    new go.Binding("itemArray", "items"))
            )
        )
    );

    const threadActiveNode = $$(go.Node, "Auto",
        $$(go.Panel, "Vertical",
            $$(go.Panel, "Auto",
                leftAlign,
                $$(go.TextBlock,
                    {
                        font: "10px Monospace"
                    },
                    new go.Binding("text", "pid")
                )
            ),
            $$(go.Panel, "Auto",
                leftAlign,
                $$(go.Shape, "Rectangle", { fill: "white", strokeWidth: 2  }),
                $$(go.Panel, "Vertical",
                    {
                        alignment: go.Spot.TopLeft,
                        defaultAlignment: go.Spot.Left,
                        stretch: go.GraphObject.Horizontal
                    },
                    new go.Binding("itemArray", "items"))
            )
        )
    );

    const nodetmpl = new go.Map();
    nodetmpl.add('list', itemNode);
    nodetmpl.add('thread', threadNode);
    nodetmpl.add('thread_active', threadActiveNode);
    nodetmpl.add('', defaultNode);
    diagram.nodeTemplateMap = nodetmpl;

    diagram.groupTemplate =
        $$(go.Group, "Spot",
            {
                isTreeExpanded: false,
                layout: $$(go.LayeredDigraphLayout,
                    { direction: 0, columnSpacing: 5, layerSpacing: 5 }),
                isTreeLeaf: false
            },
            $$(go.Panel, "Auto",
                $$(go.Shape, "RoundedRectangle",
                    {
                        parameter1: 14,
                        fill: "#ddd"
                    }),
                $$(go.Placeholder, { padding: 4 })
            ),
            $$("TreeExpanderButton",
                {
                    name: 'TREEBUTTON',
                    width: 12, height: 12,
                    alignment: go.Spot.TopRight,
                    alignmentFocus: go.Spot.Center,
                    click: (e, obj) => {  // OBJ is the Button
                        var node = obj.part;  // get the Node containing this Button
                        if (node === null) return;
                        e.handled = true;
                        expandNode(node);
                    }
                }
            )
        );

    const defaultLink = $$(go.Link, {
        routing: go.Link.Normal,
        curve: go.Link.Bezier,
        toShortLength: 2
    },
        $$(go.Shape),
        $$(go.Shape, { toArrow: "Standard" }),
        $$(go.TextBlock, new go.Binding("text", "label"),
            {
                segmentOffset: new go.Point(0, -10),
                segmentOrientation: go.Link.OrientUpright
            }),
        $$(go.TextBlock,
            { font: "12px Monospace" },
            new go.Binding("text", "content"),
            {
                segmentOffset: new go.Point(0, 17),
                segmentOrientation: go.Link.OrientUpright
            })
    );

    const shortLink = $$(go.Link, {}, $$(go.Shape));

    const templmap = new go.Map();
    templmap.add('short', shortLink);
    templmap.add('', defaultLink);
    diagram.linkTemplateMap = templmap;

    // create the model with a root node data
    initdata = {
        key: init_state.hashcode,
        everExpanded: false
    };

    diagram.model = new go.GraphLinksModel([]);
    addInitNode(diagram.model, initdata);

    diagram.addDiagramListener("ChangedSelection", () => update_selection());
}
</script>

<div class="widget-tab-contents" id="diagramDivName-container" style="width: 100%; height: 100%; margin: 0; padding: 0;">
